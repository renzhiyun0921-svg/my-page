<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的网页</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            background: white;
            width: 60%;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: 300px;
            border-radius: 10px;
            margin-top: 15px;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #ff0000;
        }
    </style>

</head>
<body>

<div class="container">
    <h1>小李</h1>
    <p>爱好：抽烟  😄</p>

    <img src="sample.jpg" alt="图片">

    <br><br>
    <button onclick="alert('你个SB！')">来一根！</button>
</div>

</body>
</html>
